name = "chainsawclay-admin"
main = "src/worker.js"
compatibility_date = "2024-12-01"
workers_dev = false

# ============================
# D1 DATABASE
# ============================
[[d1_databases]]
binding = "DB_chainsaw"
database_name = "chainsaw"
database_id = "b836fa8d-4f53-49d4-93d2-70a7557d5f7c"

# ============================
# R2 BUCKET (Videos)
# ============================
[[r2_buckets]]
binding = "https://cd66209393471bee4b76a0f267205f55.r2.cloudflarestorage.com/chainsawclay-videos"
bucket_name = "chainsawclay-videos"

# ============================
# ENVIRONMENT VARIABLES
# ============================
[vars]
ADMIN_EMAIL = "support@chainsawclay.com"
MAIL_FROM = "support@chainsawclay.com"

# ============================
# ROUTES (THIS IS THE FIX)
# ============================
routes = [
  # Your Worker lives at api.chainsawclay.com
  { pattern = "api.chainsawclay.com/api/*", zone_name = "chainsawclay.com" }
]

# ============================
# NODE COMPAT (needed for crypto)
# ============================
node_compat = true
