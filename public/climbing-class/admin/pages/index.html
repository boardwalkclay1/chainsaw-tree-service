<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000 url('/img/tree-service-logo.png') no-repeat center top;
      background-size: 380px;
      color: #fff;
      font-family: 'Anton', sans-serif;
    }

    header {
      background: rgba(0,0,0,0.85);
      border-bottom: 2px solid #ff7b00;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #ff7b00;
      text-shadow: 0 0 12px #ff7b00;
    }

    /* MAIN NAV BUTTONS */
    .main-nav {
      display: flex;
      gap: 12px;
    }

    .main-nav a {
      color: #ff7b00;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      border: 2px solid #ff7b00;
      background: rgba(20,20,20,0.9);
      font-size: 1rem;
    }

    /* BURGER MENU */
    .burger {
      width: 40px;
      height: 40px;
      border: 2px solid #ff7b00;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: rgba(20,20,20,0.9);
    }

    .burger span {
      font-size: 1.6rem;
      color: #ff7b00;
    }

    /* DROPDOWN MENU */
    #dropdown {
      display: none;
      position: absolute;
      right: 20px;
      top: 80px;
      background: rgba(0,0,0,0.95);
      border: 2px solid #ff7b00;
      border-radius: 12px;
      padding: 20px;
      width: 220px;
      box-shadow: 0 0 18px #ff7b00;
    }

    #dropdown a {
      display: block;
      color: #ff7b00;
      padding: 10px 0;
      text-decoration: none;
      border-bottom: 1px solid #ff7b00;
    }

    #dropdown a:last-child {
      border-bottom: none;
    }

    /* CONTENT */
    main {
      padding: 30px;
      max-width: 1200px;
      margin: auto;
    }

    h2, h3 {
      color: #ff7b00;
      text-shadow: 0 0 12px #ff7b00;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(0,0,0,0.75);
      border: 2px solid #ff7b00;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 18px #ff7b00;
    }

    .list .card {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Admin Dashboard</h1>

  <div class="main-nav">
    <a href="/climbing-class/admin/pages/index.html">Dashboard</a>
    <a href="/climbing-class/admin/pages/videos.html">Videos</a>
    <a href="/climbing-class/admin/pages/clients.html">Clients</a>
  </div>

  <div class="burger" onclick="toggleMenu()">
    <span>☰</span>
  </div>

  <div id="dropdown">
    <a href="/climbing-class/admin/pages/students.html">Students</a>
    <a href="/climbing-class/admin/pages/lessons.html">Lessons</a>
    <a href="/climbing-class/admin/pages/cities.html">Cities</a>
    <a href="/climbing-class/admin/pages/reservations.html">Reservations</a>
    <a href="/climbing-class/admin/pages/messages.html">Messages</a>
    <a href="/climbing-class/admin/pages/payments.html">Finances</a>
  </div>
</header>

<main>

  <h2>Admin Overview</h2>
  <p>This dashboard shows live analytics, students, clients, lessons, reservations, and finances.</p>

  <!-- ANALYTICS -->
  <section>
    <h3>Analytics Summary</h3>
    <div id="admin-analytics" class="grid"></div>
  </section>

  <!-- STUDENTS -->
  <section>
    <h3>Students</h3>
    <div id="admin-students" class="list"></div>
  </section>

  <!-- CLIENTS -->
  <section>
    <h3>Clients</h3>
    <div id="admin-clients" class="list"></div>
  </section>

  <!-- LESSONS -->
  <section>
    <h3>Lessons</h3>
    <div id="admin-lessons" class="list"></div>
  </section>

  <!-- RESERVATIONS -->
  <section>
    <h3>Reservations</h3>
    <div id="admin-reservations" class="list"></div>
  </section>

</main>

<script>
function toggleMenu() {
  const menu = document.getElementById('dropdown');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}
</script>

<script src="/climbing-class/admin/admin.js"></script>

</body>
</html>
